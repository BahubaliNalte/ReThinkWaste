<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer/Admin Login</title>
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>
    <div class="auth-container">
        <h2>Login</h2>
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button id="login-button">Login</button>
        <p>Don't have an account? <span id="show-signup">Sign Up</span></p>
    </div>

    <!-- Signup Form -->
    <div class="auth-container" id="signup-form" style="display: none;">
        <h2>Sign Up</h2>
        <input type="text" id="signup-name" placeholder="Full Name" required>
        <input type="email" id="signup-email" placeholder="Email" required>
        <input type="password" id="signup-password" placeholder="Password" required>
        <select id="signup-role">
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
        </select>
        <button id="signup-button">Sign Up</button>
        <p>Already have an account? <span id="show-login">Login</span></p>
    </div>

    <script src="./js/login.js"></script>
</body>
</html>
